<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tierpolitik Monitor – Debug</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}
    .wrap{max-width:1200px;margin:0 auto}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .card{background:#111827;border:1px solid #334155;border-radius:8px;padding:10px}
    .progress-wrap{display:grid;gap:10px;margin-top:12px}
    .progress{background:#111827;border:1px solid #334155;border-radius:8px;padding:10px}
    .bar{height:14px;background:#0b1220;border-radius:999px;overflow:hidden;border:1px solid #334155}
    .bar > span{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#84cc16)}
    table{width:100%;border-collapse:collapse;background:#111827;margin-top:10px}
    th,td{border:1px solid #334155;padding:6px;text-align:left}
    th{background:#1f2937}
    a{color:#93c5fd}
    h2{margin-top:24px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Debug – Tierpolitik Monitor</h1>
  <p><a href="/">Home</a> · <a href="/review.html">Review</a></p>
  <div id="health" class="card" style="margin-bottom:10px"></div>
  <div id="cards" class="cards"></div>
  <div class="progress-wrap">
    <div class="progress" id="projectProgress"></div>
    <div class="progress" id="cantonProgress"></div>
    <div class="progress" id="yearProgress"></div>
    <div class="progress" id="municipalityProgress"></div>
    <div class="progress" id="cantonGrid"></div>
  </div>

  <h2>Nach Quelle</h2>
  <table><thead><tr><th>Source</th><th>Total</th><th>Yes</th><th>Unsure</th><th>Queued</th><th>Home visible</th></tr></thead><tbody id="bySource"></tbody></table>

  <h2>Nach Kanton</h2>
  <table><thead><tr><th>Kanton</th><th>Total</th><th>Yes</th><th>Home Yes</th></tr></thead><tbody id="byCanton"></tbody></table>

  <h2>Nach Gemeinde (Top)</h2>
  <table><thead><tr><th>Gemeinde</th><th>Total</th><th>Yes</th><th>Home Yes</th></tr></thead><tbody id="byMunicipality"></tbody></table>
</div>
<script>
function td(v){return `<td>${v ?? ''}</td>`}
fetch('/data/debug-stats.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  const bySource = Object.fromEntries((d.by_source||[]).map(x=>[x.source_key,x]));
  const chYes = (bySource['ch-bund-curia-vista']?.yes || 0) + (bySource['ch-bund-legacy-curated']?.yes || 0);
  const beYes = (bySource['ch-be-grosser-rat']?.yes || 0) + (bySource['ch-be-legacy-rss']?.yes || 0);
  const queue = d.review_queue || 0;

  let state='GREEN', color='#16a34a', msg='Alles im Sollbereich.';
  const problems=[];
  if(chYes===0){problems.push('CH hat 0 yes-Treffer');}
  if(beYes===0){problems.push('BE hat 0 yes-Treffer');}
  if(queue>180){problems.push(`Review-Queue sehr hoch (${queue})`);}

  if(chYes===0 || beYes===0){
    state='RED'; color='#dc2626'; msg='Datenversorgung unvollständig.';
  } else if(queue>120){
    state='YELLOW'; color='#f59e0b'; msg='Queue erhöht – Review-Belastung hoch.';
  }

  document.getElementById('health').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:14px;height:14px;border-radius:999px;background:${color}"></div>
      <strong>${state}</strong>
      <span>${msg}</span>
    </div>
    ${problems.length?`<div style="margin-top:6px;font-size:13px">Hinweise: ${problems.join(' · ')}</div>`:''}
  `;

  const cards=[
    ['Items total',d.items_total],
    ['Home visible',d.items_home_visible],
    ['Home yes',d.items_home_yes],
    ['Review queue',d.review_queue],
    ['CH yes',chYes],
    ['BE yes',beYes],
  ];
  document.getElementById('cards').innerHTML = cards.map(([k,v])=>`<div class="card"><div>${k}</div><div style="font-size:24px;font-weight:700">${v}</div></div>`).join('');

  const pp = d.project_progress || {percent:0,components:{cantons:{fulfilled:0,target:26},years:{covered_years_back:0,target_years_back:1},municipalities:{covered:0,target:2000}}};
  const ppPct = Math.max(0, Math.min(100, Math.round(pp.percent || 0)));
  document.getElementById('projectProgress').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong>Projektfortschritt gesamt</strong>
      <span>${ppPct}%</span>
    </div>
    <div class="bar"><span style="width:${ppPct}%"></span></div>
    <div style="margin-top:6px;font-size:12px;opacity:.85">
      Kantone: ${pp.components?.cantons?.fulfilled ?? 0}/${pp.components?.cantons?.target ?? 26} ·
      Jahre: ${pp.components?.years?.covered_years_back ?? 0}/${pp.components?.years?.target_years_back ?? 0} ·
      Gemeinden: ${pp.components?.municipalities?.covered ?? 0}/${pp.components?.municipalities?.target ?? 2000}
    </div>
  `;

  const cp = d.canton_progress || {fulfilled:0,target:26,fulfilled_cantons:[],missing_cantons:[],fulfilled_available:0,missing_available_cantons:[],by_canton:[]};
  const cpPct = Math.max(0, Math.min(100, Math.round((cp.fulfilled / Math.max(1, cp.target)) * 100)));
  const cpAvailPct = Math.max(0, Math.min(100, Math.round(((cp.fulfilled_available || 0) / Math.max(1, cp.target)) * 100)));
  document.getElementById('cantonProgress').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong>Kantone erfüllt bis ${cp.by_canton?.[0]?.target_min_year ?? 2000}</strong>
      <span>${cp.fulfilled}/${cp.target} (${cpPct}%)</span>
    </div>
    <div class="bar"><span style="width:${cpPct}%"></span></div>
    <div style="margin-top:6px;font-size:12px;opacity:.85">Verfügbar erfüllt: ${cp.fulfilled_available || 0}/${cp.target} (${cpAvailPct}%)</div>
    <div style="margin-top:6px;font-size:12px;opacity:.85">Fehlend (strict): ${(cp.missing_cantons||[]).join(', ') || '—'}</div>
  `;

  const cantonBars = (cp.by_canton||[]).map(r=>{
    const ok = !!r.fulfilled;
    const okAvail = !!r.fulfilled_available;
    const pct = ok ? 100 : (okAvail ? 70 : 6);
    const color = ok
      ? 'linear-gradient(90deg,#22c55e,#84cc16)'
      : (okAvail ? 'linear-gradient(90deg,#0ea5e9,#22d3ee)' : 'linear-gradient(90deg,#334155,#475569)');
    const label = ok
      ? `✅ strict erfüllt (ältestes ${r.oldest_year})`
      : (okAvail
        ? `🟦 verfügbar erfüllt (ältestes ${r.oldest_year}, verfügbare Grenze ${r.available_min_year})`
        : `⏳ offen (ältestes ${r.oldest_year ?? '—'})`);
    return `
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <strong>${r.canton}</strong>
          <span>${label} · Items: ${r.total ?? 0}</span>
        </div>
        <div class="bar"><span style="width:${pct}%;background:${color}"></span></div>
      </div>
    `;
  }).join('');
  document.getElementById('cantonGrid').innerHTML = `<strong>Fortschritt je Kanton (Kriterium: Daten bis Jahr 2000)</strong><div style="margin-top:8px">${cantonBars}</div>`;

  const yp = d.year_progress || {};
  const ypDone = yp.covered_years_back || 0;
  const ypTarget = yp.target_years_back || 1;
  const ypPct = Math.max(0, Math.min(100, Math.round((ypDone / Math.max(1, ypTarget)) * 100)));
  document.getElementById('yearProgress').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong>Zeit-Abdeckung (rückwärts)</strong>
      <span>ältestes Jahr: ${yp.oldest_year ?? '—'} · Ziel: ${yp.target_min_year ?? '—'} · ${ypPct}%</span>
    </div>
    <div class="bar"><span style="width:${ypPct}%"></span></div>
    <div style="margin-top:6px;font-size:12px;opacity:.85">Visualisiert rückwärts von heute bis Zieljahr.</div>
  `;

  const mp = d.municipality_progress || {covered:0,target:2000};
  const mpPct = Math.max(0, Math.min(100, Math.round((mp.covered / Math.max(1, mp.target)) * 100)));
  document.getElementById('municipalityProgress').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong>Gemeinden-Abdeckung</strong>
      <span>${mp.covered}/${mp.target} (${mpPct}%)</span>
    </div>
    <div class="bar"><span style="width:${mpPct}%;background:linear-gradient(90deg,#38bdf8,#22d3ee)"></span></div>
  `;

  document.getElementById('bySource').innerHTML=(d.by_source||[]).map(r=>`<tr>${td(r.source_key)}${td(r.total)}${td(r.yes)}${td(r.unsure)}${td(r.queued)}${td(r.home_visible)}</tr>`).join('');
  document.getElementById('byCanton').innerHTML=(d.by_canton||[]).map(r=>`<tr>${td(r.canton)}${td(r.total)}${td(r.yes)}${td(r.home_yes)}</tr>`).join('');
  document.getElementById('byMunicipality').innerHTML=(d.by_municipality_top||[]).map(r=>`<tr>${td(r.municipality)}${td(r.total)}${td(r.yes)}${td(r.home_yes)}</tr>`).join('');
}).catch(err=>{
  document.getElementById('cards').innerHTML = `<div class="card">Fehler beim Laden von /data/debug-stats.json: ${err}</div>`;
});
</script>
</body>
</html>
