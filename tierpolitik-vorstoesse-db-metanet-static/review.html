<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tierpolitik Monitor – Review Inbox (DB)</title>
  <link rel="icon" href="/favicon-search.svg" type="image/svg+xml" />
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:16px}
    .wrap{max-width:1200px;margin:0 auto}
    a{color:#93c5fd}
    table{width:100%;border-collapse:collapse;background:#111827;margin-top:12px}
    th,td{border:1px solid #334155;padding:8px;vertical-align:top}
    th{background:#1f2937}
    button{margin-right:6px}
    .yes{color:#86efac}.unsure{color:#fde68a}.no{color:#fca5a5}
    .row-done{opacity:.45}
    .row-selected{outline:2px solid #60a5fa;outline-offset:-2px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Review Inbox (DB)</h1>
  <p>Quelle: <code>/data/review-inbox.json</code> · Entscheidungen werden direkt in Neon gespeichert (API: <code>/api/review-decision</code>).</p>
  <p>
    <button id="exportBtn">Entscheidungen exportieren</button>
    <button id="toggleDoneBtn">Bearbeitete anzeigen</button>
    <a href="/">Home</a>
    <span id="health" style="margin-left:10px;color:#93c5fd">Neon: prüfe…</span>
  </p>
  <table>
    <thead>
      <tr><th>Titel</th><th>Quelle</th><th>Tierbezug</th><th>Status</th><th>Aktion</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>
<script>
const state={items:[],decisions:{},showDone:false,selected:0};
const rows=document.getElementById('rows');
const key='tpm.review.decisions.v1';
const apiEnabled = window.location.port === '8787';
state.decisions=JSON.parse(localStorage.getItem(key)||'{}');

function save(){localStorage.setItem(key,JSON.stringify(state.decisions));}
function decision(id){return state.decisions[id]||'queued'}
function visibleItems(){
  return state.items.filter(it=> state.showDone ? true : decision(it.id)==='queued');
}

async function applyDecision(id,val){
  // Static monitor mode (port 8888): keep local decisions only.
  if(!apiEnabled){
    state.decisions[id]=val;
    save();
    render();
    return;
  }

  try{
    const res=await fetch('/api/review-decision',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({id,decision:val})
    });
    if(!res.ok) throw new Error('API failed');
    state.decisions[id]=val;
    save();
    render();
  }catch(e){
    alert('Speichern in Neon fehlgeschlagen. Läuft der review_server.py?');
  }
}

function render(){
  rows.innerHTML='';
  const vis=visibleItems();
  if(state.selected>=vis.length) state.selected=Math.max(0, vis.length-1);

  for(let i=0;i<vis.length;i++){
    const it=vis[i];
    const d=decision(it.id);
    const tr=document.createElement('tr');
    if(d!=='queued') tr.classList.add('row-done');
    if(i===state.selected) tr.classList.add('row-selected');
    tr.innerHTML=`
      <td><strong>${it.title||'(ohne Titel)'}</strong><br><small>${it.summary||''}</small><br><small><b>Tierbezug:</b> ${it.label==='yes'?'ja':(it.label==='unsure'?'unsicher':'nein')}</small><br><a target="_blank" href="${it.url||'#'}">Original</a></td>
      <td>${it.source_key}<br><small>${it.external_id}</small></td>
      <td class="${it.label}"><b>${it.label}</b>${it.confidence?` (${it.confidence.toFixed(2)})`:''}<br><small>${it.reason||''}</small></td>
      <td>${d}</td>
      <td>
        <button data-id="${it.id}" data-v="approved">Approve</button>
        <button data-id="${it.id}" data-v="rejected">Reject</button>
      </td>`;
    rows.appendChild(tr);
  }

  rows.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>applyDecision(b.dataset.id,b.dataset.v));

  const selectedRow=rows.querySelector('.row-selected');
  if(selectedRow) selectedRow.scrollIntoView({block:'nearest'});
}

const toggleBtn=document.getElementById('toggleDoneBtn');
function updateToggleBtn(){toggleBtn.textContent = state.showDone ? 'Bearbeitete ausblenden' : 'Bearbeitete anzeigen';}
toggleBtn.onclick=()=>{state.showDone=!state.showDone;state.selected=0;updateToggleBtn();render();};
document.getElementById('exportBtn').onclick=()=>{
  const payload=Object.entries(state.decisions).map(([id,decision])=>({id,decision,ts:new Date().toISOString()}));
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='review-decisions-db.json';a.click();URL.revokeObjectURL(a.href);
};

document.addEventListener('keydown', async (e)=>{
  const vis=visibleItems();
  if(!vis.length) return;

  if(e.key==='ArrowDown'){
    e.preventDefault();
    state.selected=Math.min(vis.length-1, state.selected+1);
    render();
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    state.selected=Math.max(0, state.selected-1);
    render();
  } else if(e.key==='a' || e.key==='A'){
    e.preventDefault();
    await applyDecision(vis[state.selected].id,'approved');
  } else if(e.key==='d' || e.key==='D'){
    e.preventDefault();
    await applyDecision(vis[state.selected].id,'rejected');
  }
});

updateToggleBtn();
if(apiEnabled){
  fetch('/api/health',{cache:'no-store'})
    .then(r=>r.json())
    .then(h=>{document.getElementById('health').textContent = h.ok ? 'Neon: verbunden ✅' : 'Neon: Fehler ❌';})
    .catch(()=>{document.getElementById('health').textContent='Neon: nicht erreichbar ❌';});
}else{
  document.getElementById('health').textContent='Neon: read-only (Static-Mode)';
}

fetch('/data/review-inbox.json',{cache:'no-store'})
  .then(r=>r.json())
  .then(data=>{state.items=Array.isArray(data)?data:[]; state.selected=0; render();})
  .catch(()=>{state.items=[]; render();});
</script>
</body>
</html>
